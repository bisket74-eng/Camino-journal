<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Camino Journal</title>

<meta name="description" content="A daily Camino journal, travel log, scrapbook, and printable book." />
<meta name="theme-color" content="#efe4cf" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Camino Journal" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Courier+Prime:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --sand: #efe4cf;
  --sand-dark: #dfcba8;
  --paper: #fbf5e8;
  --paper-soft: #f5ead6;
  --ink: #2d241d;
  --muted: #776650;
  --blue: #2f496e;
  --red: #993a30;
  --green: #4f684f;
  --gold: #b98b3b;
  --line: rgba(45,36,29,.18);
  --shadow: 0 12px 32px rgba(62,47,29,.14);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  color: var(--ink);
  font-family: "Libre Franklin", system-ui, sans-serif;
  font-size: 17px;
  background:
    radial-gradient(circle at 18% 4%, rgba(255,255,255,.55), transparent 32%),
    radial-gradient(circle at 85% 70%, rgba(153,58,48,.08), transparent 34%),
    linear-gradient(135deg, #eadbc0, #f7eedb 48%, #e2ceaa);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: .18;
  background-image:
    linear-gradient(90deg, rgba(45,36,29,.05) 1px, transparent 1px),
    linear-gradient(rgba(45,36,29,.04) 1px, transparent 1px);
  background-size: 28px 28px;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

.airmail-border {
  height: 10px;
  width: 100%;
  background: repeating-linear-gradient(
    -45deg,
    var(--red) 0px,
    var(--red) 10px,
    var(--paper) 10px,
    var(--paper) 15px,
    var(--blue) 15px,
    var(--blue) 25px,
    var(--paper) 25px,
    var(--paper) 30px
  );
}

.app-header {
  text-align: center;
  padding: 26px 16px 21px;
  border-bottom: 1px solid rgba(45,36,29,.16);
  background: linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,0));
}

.header-mark {
  line-height: 1;
  margin-bottom: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.camino-shell-icon {
  width: 58px;
  height: 58px;
  display: block;
  filter: drop-shadow(0 2px 2px rgba(62,47,29,.18));
}

.app-title {
  margin: 0;
  font-family: "Caveat", cursive;
  font-weight: 700;
  font-size: 72px;
  line-height: .9;
  letter-spacing: .5px;
  color: var(--ink);
}

.app-subtitle {
  margin-top: 8px;
  color: var(--blue);
  font-family: "Courier Prime", monospace;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 2.4px;
}

.header-actions {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.btn {
  border: 1px solid rgba(47,73,110,.28);
  background: rgba(251,245,232,.82);
  color: var(--blue);
  border-radius: 5px;
  padding: 9px 13px;
  cursor: pointer;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 2px 6px rgba(62,47,29,.07);
}

.btn:hover {
  background: #fffdf8;
}

.btn-red {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

.btn-danger {
  color: var(--red);
  border-color: rgba(153,58,48,.45);
  background: transparent;
}

.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 110px;
  position: relative;
}

.card {
  background: rgba(251,245,232,.94);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 10px;
  padding: 22px 20px;
}

.route-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  padding: 16px 17px;
}

.route-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 25px;
  font-weight: 700;
  line-height: 1.05;
}

.route-meta {
  font-size: 15px;
  color: var(--muted);
  margin-top: 4px;
}

.empty {
  text-align: center;
  padding: 48px 22px;
  color: var(--blue);
}

.empty-icon {
  font-size: 38px;
}

.empty p {
  margin: 12px 0 0;
  font-size: 17px;
}

.empty .soft {
  color: var(--muted);
  font-family: "Libre Baskerville", serif;
  font-style: italic;
  font-size: 14px;
}

.entry-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.entry-card {
  width: 100%;
  text-align: left;
  display: flex;
  gap: 16px;
  align-items: center;
  position: relative;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: rgba(251,245,232,.96);
  padding: 14px 14px 14px 12px;
  box-shadow: 0 8px 22px rgba(62,47,29,.1);
  cursor: pointer;
}

.entry-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 12px;
  bottom: 12px;
  width: 3px;
  border-radius: 3px;
  background: linear-gradient(var(--red), var(--gold));
}

.entry-body {
  flex: 1;
  min-width: 0;
}

.entry-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.05;
}

.entry-meta {
  font-family: "Courier Prime", monospace;
  color: var(--blue);
  font-size: 14px;
  margin-top: 5px;
}

.entry-snippet {
  margin-top: 9px;
  font-family: "Libre Baskerville", serif;
  font-size: 14px;
  line-height: 1.55;
  color: rgba(45,36,29,.76);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.fab {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 58px;
  height: 58px;
  border: none;
  border-radius: 50%;
  background: var(--red);
  color: white;
  font-size: 31px;
  line-height: 1;
  box-shadow: 0 8px 20px rgba(62,47,29,.32);
  cursor: pointer;
}

@media (min-width: 700px) {
  .fab {
    right: calc(50% - 320px - 72px);
  }
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  padding: 7px 0 15px;
  color: var(--blue);
  cursor: pointer;
  font-weight: 700;
}

.section-title {
  margin: 0 0 8px;
  font-family: "Cormorant Garamond", serif;
  font-size: 30px;
  line-height: 1;
}

.panel-sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
  margin: 6px 0 20px;
}

.field {
  margin-bottom: 20px;
}

.field-label,
.detail-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: "Courier Prime", monospace;
  color: var(--blue);
  font-size: 15px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 9px;
}

.input,
.textarea,
.select {
  width: 100%;
  border: 1px solid rgba(45,36,29,.24);
  background: #fffdf8;
  border-radius: 5px;
  color: var(--ink);
  padding: 12px 13px;
  font-size: 16px;
}

.textarea {
  min-height: 150px;
  resize: vertical;
  line-height: 1.75;
  font-family: "Libre Baskerville", serif;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 31px,
    rgba(47,73,110,.12) 32px
  );
}

.input:focus,
.textarea:focus,
.select:focus {
  outline: 2px solid rgba(47,73,110,.35);
  outline-offset: 1px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 500px) {
  .field-row {
    grid-template-columns: 1fr;
  }
}

.choice-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.choice {
  border: 1px solid rgba(45,36,29,.22);
  background: #fffdf8;
  color: var(--ink);
  border-radius: 4px;
  padding: 9px 11px;
  cursor: pointer;
}

.choice.selected {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.distance-box {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: stretch;
}

@media (max-width: 500px) {
  .distance-box {
    grid-template-columns: 1fr;
  }
}

.distance-control {
  display: flex;
  border: 1px solid rgba(45,36,29,.24);
  border-radius: 5px;
  background: #fffdf8;
  overflow: hidden;
}

.spin {
  width: 44px;
  border: none;
  background: rgba(47,73,110,.08);
  color: var(--blue);
  font-size: 24px;
  cursor: pointer;
}

.distance-input {
  flex: 1;
  min-width: 0;
  border: none;
  background: transparent;
  padding: 12px 10px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
}

.unit-toggle {
  display: flex;
  border: 1px solid rgba(45,36,29,.24);
  border-radius: 5px;
  background: #fffdf8;
  overflow: hidden;
}

.unit-toggle button {
  border: none;
  background: transparent;
  color: var(--muted);
  font-weight: 700;
  padding: 12px 14px;
  cursor: pointer;
}

.unit-toggle button.active {
  background: var(--blue);
  color: white;
}

.detail-title {
  margin: 12px 0 2px;
  font-family: "Cormorant Garamond", serif;
  font-size: 36px;
  line-height: 1;
}

.detail-meta {
  color: var(--blue);
  font-family: "Courier Prime", monospace;
  font-size: 15px;
  margin-bottom: 14px;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  border-radius: 4px;
  background: rgba(47,73,110,.08);
  border: 1px solid rgba(47,73,110,.18);
  color: var(--blue);
  padding: 5px 9px;
  font-size: 15px;
  font-weight: 700;
}

.detail-section {
  margin-top: 20px;
}

.notes-display {
  white-space: pre-wrap;
  font-family: "Libre Baskerville", serif;
  font-size: 16px;
  line-height: 1.85;
  color: #372d24;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
}

.photo-tile {
  position: relative;
  aspect-ratio: 1;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.4);
}

.photo-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  background: rgba(0,0,0,.62);
  color: white;
  cursor: pointer;
}

.photo-add {
  aspect-ratio: 1;
  border-radius: 6px;
  border: 1.5px dashed rgba(47,73,110,.36);
  background: rgba(47,73,110,.04);
  color: var(--blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  font-weight: 700;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 24px;
}

.action-row .btn {
  flex: 1;
  min-width: 120px;
}

.delete-link-btn {
  display: block;
  width: 100%;
  text-align: center;
  margin-top: 18px;
  padding: 10px;
  background: none;
  border: none;
  color: var(--red);
  opacity: .7;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.delete-link-btn:hover,
.delete-link-btn:active {
  opacity: 1;
  text-decoration: underline;
}

.postmark {
  width: 100px;
  height: 100px;
  flex-shrink: 0;
}

.detail-postmark {
  width: 124px;
  height: 124px;
}

.postmark svg {
  width: 100%;
  height: 100%;
}

.pm-ring {
  fill: none;
  stroke: var(--blue);
  stroke-width: 2.4;
}

.pm-inner {
  fill: none;
  stroke: var(--blue);
  stroke-width: 1.8;
}

.pm-text {
  font-family: "Courier Prime", monospace;
  font-size: 13px;
  letter-spacing: 1px;
  fill: var(--blue);
  font-weight: 700;
}

.pm-day {
  font-family: "Courier Prime", monospace;
  font-size: 34px;
  fill: var(--red);
  font-weight: 700;
}

.pm-month,
.pm-year {
  font-family: "Courier Prime", monospace;
  font-size: 13px;
  letter-spacing: 1.2px;
  fill: var(--blue);
  font-weight: 700;
}

.stop-card {
  border: 1px solid var(--line);
  background: rgba(255,255,255,.45);
  border-radius: 7px;
  padding: 13px;
  margin-bottom: 10px;
}

.stop-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.stop-name {
  font-family: "Cormorant Garamond", serif;
  font-size: 23px;
  font-weight: 700;
}

.stop-meta {
  color: var(--muted);
  font-size: 15px;
  margin-top: 2px;
}

.stop-notes {
  font-family: "Libre Baskerville", serif;
  font-size: 14px;
  line-height: 1.6;
  margin-top: 8px;
}

.stop-photo {
  margin-top: 9px;
  width: 94px;
  height: 94px;
  object-fit: cover;
  border-radius: 5px;
  border: 1px solid var(--line);
}

.person-row {
  display: flex;
  gap: 8px;
}

.person-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.person-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(79,104,79,.1);
  border: 1px solid rgba(79,104,79,.25);
  color: var(--green);
  padding: 5px 9px;
  border-radius: 4px;
  font-size: 15px;
  font-weight: 700;
}

.person-tag button {
  border: none;
  background: none;
  color: var(--green);
  cursor: pointer;
  padding: 0;
}

.person-photo {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  object-fit: cover;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 9px 18px;
  border-radius: 22px;
  z-index: 80;
  box-shadow: 0 8px 20px rgba(0,0,0,.24);
  font-size: 15px;
}

.toast.error {
  background: var(--red);
}

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.86);
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.lightbox img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 6px;
}

.hidden {
  display: none !important;
}

.menu-wrap {
  position: relative;
}

.menu {
  position: absolute;
  top: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: #fffdf8;
  border: 1px solid var(--line);
  border-radius: 7px;
  box-shadow: 0 12px 24px rgba(62,47,29,.22);
  z-index: 50;
  min-width: 200px;
  overflow: hidden;
}

.menu button {
  width: 100%;
  border: none;
  background: none;
  text-align: left;
  padding: 12px 14px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
}

.menu button:hover {
  background: rgba(185,139,59,.12);
}

.menu button + button {
  border-top: 1px solid rgba(45,36,29,.09);
}

.packing-group {
  border: 1px solid var(--line);
  border-radius: 7px;
  margin-bottom: 12px;
  overflow: hidden;
  background: rgba(255,255,255,.35);
}

.packing-head {
  width: 100%;
  border: none;
  background: rgba(47,73,110,.06);
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 13px 14px;
  cursor: pointer;
  font-weight: 700;
  color: var(--ink);
}

.packing-body {
  padding: 10px 14px 14px;
}

.packing-row {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,36,29,.07);
}

.packing-row:last-child {
  border-bottom: none;
}

.check-btn {
  width: 23px;
  height: 23px;
  border-radius: 4px;
  border: 1.5px solid rgba(45,36,29,.35);
  background: white;
  cursor: pointer;
}

.check-btn.checked {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

.pack-name {
  flex: 1;
}

.pack-name.checked {
  text-decoration: line-through;
  opacity: .55;
}

.travel-card {
  width: 100%;
  text-align: left;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.42);
  border-radius: 6px;
  padding: 13px;
  margin-bottom: 10px;
  cursor: pointer;
}

.travel-title {
  font-weight: 700;
}

.travel-meta {
  color: var(--blue);
  font-size: 15px;
  margin-top: 4px;
}

.print-shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 18px 12px 60px;
}

.print-toolbar {
  background: rgba(251,245,232,.96);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 16px;
}

.print-page {
  width: min(850px, 100%);
  min-height: 1100px;
  margin: 0 auto 22px;
  background: #fff7e8;
  color: #2d241b;

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

// Like load(), but tells the caller whether the raw value existed and failed
// to parse, vs. genuinely never having been set. This matters for anything
// we must never silently wipe (the journal entries, above all).
function loadSafe(key, fallback) {
  let raw = null;
  try {
    raw = localStorage.getItem(key);
  } catch (e) {
    return { value: fallback, hadRawValue: false, parseFailed: false };
  }

  if (!raw) {
    return { value: fallback, hadRawValue: false, parseFailed: false };
  }

  try {
    return { value: JSON.parse(raw), hadRawValue: true, parseFailed: false };
  } catch (e) {
    return { value: fallback, hadRawValue: true, parseFailed: true, raw: raw };
  }
}

function save(key, value) {
  if (key === KEYS.entries) {
    try {
      const previousRaw = localStorage.getItem(KEYS.entries);
      const previousCount = previousRaw ? (JSON.parse(previousRaw).length || 0) : 0;
      const nextCount = Array.isArray(value) ? value.length : -1;

      // Keep a small rolling audit log of every write to the entries key,
      // especially flagging any write that goes from having entries to
      // having none — that's the exact signature of accidental data loss.
      const auditLog = JSON.parse(localStorage.getItem("camino-journal-entries-audit") || "[]");
      auditLog.push({
        at: new Date().toISOString(),
        previousCount: previousCount,
        nextCount: nextCount,
        suspicious: previousCount > 0 && nextCount === 0,
        stack: (new Error()).stack
      });
      // Keep only the most recent 20 entries so this never grows unbounded.
      while (auditLog.length > 20) auditLog.shift();
      localStorage.setItem("camino-journal-entries-audit", JSON.stringify(auditLog));
    } catch (e) {
      // Never let audit logging itself break saving.
    }
  }

  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    toast("Storage is full — backup your journal soon.", true);
    return false;
  }
}

function makeDefaultPacking() {
  return DEFAULT_PACKING.map(group => ({
    category: group[0],
    items: group[1].map(name => ({ id: uid(), name, checked: false }))
  }));
}

let custom = load(KEYS.custom, {});
let packing = load(KEYS.packing, makeDefaultPacking());
let travel = load(KEYS.travel, []);
let settings = load(KEYS.settings, { currentRoute: "Camino Francés" });

let entries;
let entriesLoadWarning = null;
{
  const result = loadSafe(KEYS.entries, null);

  if (result.value !== null) {
    // Normal case: the current-version key loaded and parsed fine.
    entries = result.value;
  } else if (result.hadRawValue && result.parseFailed) {
    // The key existed but the JSON was corrupted somehow. DO NOT overwrite
    // it with an empty array — that would permanently destroy the user's
    // journal. Keep the app usable with an empty in-memory list, but never
    // persist over the original key until the user takes a recovery action,
    // and warn them loudly so they know to restore from a backup.
    entries = [];
    entriesLoadWarning = true;
  } else {
    // The current-version key never existed at all. Try migrating the old
    // v1 key if present; otherwise this is genuinely a fresh install.
    const old = load(KEYS.oldEntries, []);
    entries = Array.isArray(old) ? old.map(migrateEntry) : [];
    save(KEYS.entries, entries);
  }
}

function migrateEntry(e) {
  return {
    id: e.id || uid(),
    date: e.date || todayISO(),
    route: e.route || settings.currentRoute || "Camino Francés",
    town: e.town || "",
    albergue: e.albergue || "",
    distanceValue: e.distanceValue || (e.distanceKm === "Other" ? e.distanceCustom : e.distanceKm) || "",
    distanceUnit: e.distanceUnit || (e.distanceKm ? "km" : "mi"),
    weather: e.weather || [],
    feelings: e.feelings || [],
    stops: e.stops || [],
    people: Array.isArray(e.people) ? e.people.map(p => typeof p === "string" ? { id: uid(), name: p, photo: null } : p) : [],
    photos: e.photos || [],
    notes: e.notes || ""
  };
}

function persistEntries() {

}

function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (isError ? " error" : "");
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => el.className = "toast hidden", 1800);
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, {
    weekday: "short",
    month: "short",
    day: "numeric",
    year: "numeric"
  });
}

function formatDateTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
    " · " +
    d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

function distanceText(entry) {
  if (!entry || !entry.distanceValue) return "";
  const num = Number(entry.distanceValue);
  const clean = isNaN(num) ? entry.distanceValue : num.toFixed(1).replace(".0", "");
  return clean + " " + (entry.distanceUnit || "mi");
}

function getTownOptions(route) {
  const base = ROUTES[route] || [];
  const extra = custom[route]?.towns || [];
  return [...base, ...extra.filter(t => !base.includes(t))];
}

function getAlbergueOptions(town) {
  const base = SEED_ALBERGUES[town] || [];
  const extra = custom.__albergues?.[town] || [];
  return [...base, ...extra.filter(a => !base.includes(a))];
}

function addCustomTown(route, town) {
  if (!route || !town) return;
  if ((ROUTES[route] || []).includes(town)) return;
  if (!custom[route]) custom[route] = { towns: [] };
  if (!custom[route].towns.includes(town)) custom[route].towns.push(town);
  persistCustom();
}

function addCustomAlbergue(town, albergue) {
  if (!town || !albergue) return;
  if ((SEED_ALBERGUES[town] || []).includes(albergue)) return;
  if (!custom.__albergues) custom.__albergues = {};
  if (!custom.__albergues[town]) custom.__albergues[town] = [];
  if (!custom.__albergues[town].includes(albergue)) custom.__albergues[town].push(albergue);
  persistCustom();
}
function previousTownForEntry(entry) {
  // Prefer the user's own journal history first — this reflects where they
  // ACTUALLY slept the night before, which is what "from" should mean.
  const earlier = entries
    .filter(e =>
      e.id !== entry.id &&
      e.route === entry.route &&
      e.date <= entry.date &&
      e.town
    )
    .sort((a, b) => a.date < b.date ? 1 : -1);

  if (earlier[0]?.town) {
    return earlier[0].town;
  }

  // Fall back to the official route's stage order only when there's no
  // real entry history to go on yet (e.g. this is the very first entry
  // logged for this route).
  const routeTowns = ROUTES[entry.route] || [];
  const currentIndex = routeTowns.indexOf(entry.town);
  if (currentIndex > 0) {
    return routeTowns[currentIndex - 1];
  }

  return "";
}

function entryJourneyTitle(entry) {
  const fromTown = previousTownForEntry(entry);
  const toTown = entry.town || "";

  if (fromTown && toTown) return fromTown + " to " + toTown;
  if (toTown) return toTown;
  return "Tonight’s Stop";
}

function naturalList(items) {
  items = (items || []).filter(Boolean);

  if (items.length === 0) return "";
  if (items.length === 1) return items[0];
  if (items.length === 2) return items[0] + " and " + items[1];

  return items.slice(0, -1).join(", ") + ", and " + items[items.length - 1];
}

function buildPrettyJournalText(entry) {
  const fromTown = previousTownForEntry(entry);
  const toTown = entry.town || "tonight’s stop";
  const distance = distanceText(entry);
  const albergue = entry.albergue || "";
  const people = (entry.people || []).map(p => p.name).filter(Boolean);
  const stops = entry.stops || [];
  const feelings = entry.feelings || [];
  const weather = entry.weather || [];
  const notes = (entry.notes || "").trim();

  const lines = [];

  lines.push("Dear Camino,");

  let opening = "Today, ";

  if (distance && fromTown && toTown) {
    opening += "I walked " + distance + " from " + fromTown + " to " + toTown + ".";
  } else if (distance && toTown) {
    opening += "I walked " + distance + " and landed in " + toTown + ".";
  } else if (fromTown && toTown) {
    opening += "I made my way from " + fromTown + " to " + toTown + ".";
  } else if (toTown) {
    opening += "I landed in " + toTown + ".";
  } else {
    opening += "I walked another day along the Way.";
  }

  lines.push(opening);

  if (albergue) {
    lines.push("I am staying at " + albergue + ".");
  }

  if (weather.length) {
    lines.push("The weather was " + naturalList(weather.map(w => w.toLowerCase())) + ".");
  }

  if (feelings.length) {
    lines.push("I was feeling " + naturalList(feelings.map(f => f.toLowerCase())) + " as the day unfolded.");
  }

  stops.forEach(stop => {
    let stopLine = "";

    if (stop.name && stop.type) {
      stopLine = "I stopped at " + stop.name + ", a " + stop.type.toLowerCase();
    } else if (stop.name) {
      stopLine = "I stopped at " + stop.name;
    } else if (stop.type) {
      stopLine = "I stopped at a " + stop.type.toLowerCase();
    }

    if (stop.area) {
      stopLine += " near " + stop.area;
    }

    if (stopLine) {
      lines.push(stopLine + ".");
    }

    if (stop.notes) {
      lines.push(stop.notes.trim());
    }
  });

  if (people.length) {
    lines.push("Along the way, I met " + naturalList(people) + ".");
  }

  if (notes) {
    lines.push(notes);
  }

  lines.push("Buen Camino.");

  return lines.join("\n\n");
}
function hashLayout(value) {
  let h = 0;
  String(value || "").split("").forEach(ch => {
    h = (h * 31 + ch.charCodeAt(0)) % 9973;
  });
  return h;
}

function app() {
  return document.getElementById("app");
}

function setView(view, opts) {
  opts = opts || {};
  state.view = view;

  const historyState = {
    caminoView: view,
    activeId: state.activeId,
    draft: state.draft,
    stopDraft: state.stopDraft,
    travelDraft: state.travelDraft,
    printLayout: state.printLayout,
    printSize: state.printSize
  };

  if (opts.replace) {
    history.replaceState(historyState, "");
  } else {
    history.pushState(historyState, "");
  }

  render();
}

window.addEventListener("popstate", e => {
  const s = e.state;

  if (!s || !s.caminoView) {
    // No app state on this history entry (e.g. the very first page load) —
    // treat it as the journal root rather than leaving the app blank.
    state.view = "journal";
    state.activeId = null;
    state.draft = null;
    state.stopDraft = null;
    state.travelDraft = null;
    render();
    return;
  }

  state.view = s.caminoView;
  state.activeId = s.activeId || null;
  state.draft = s.draft || null;
  state.stopDraft = s.stopDraft || null;
  state.travelDraft = s.travelDraft || null;
  if (s.printLayout) state.printLayout = s.printLayout;
  if (s.printSize) state.printSize = s.printSize;

  render();
});

function activeEntry() {
  return entries.find(e => e.id === state.activeId);
}

function sortedEntries() {
  return [...entries].sort((a, b) => a.date < b.date ? 1 : -1);
}

function routeOptionsHtml(selected) {
  return Object.keys(ROUTES).map(route =>
    `<option value="${escapeHtml(route)}" ${route === selected ? "selected" : ""}>${escapeHtml(route)}</option>`
  ).join("");
}

function datalistHtml(id, options) {
  return `<datalist id="${id}">${options.map(o => `<option value="${escapeHtml(o)}"></option>`).join("")}</datalist>`;
}
 function selectOptions(options, current, placeholder) {
  const safeOptions = options || [];
  const currentIsCustom = current && !safeOptions.includes(current);

  return `
    <option value="">${escapeHtml(placeholder || "Select…")}</option>
    ${safeOptions.map(opt => `
      <option value="${escapeHtml(opt)}" ${opt === current ? "selected" : ""}>
        ${escapeHtml(opt)}
      </option>
    `).join("")}
    <option value="__custom__" ${currentIsCustom ? "selected" : ""}>Type my own…</option>
  `;
} 

function choiceButtons(options, selected, field, multi) {
  selected = selected || [];
  return `<div class="choice-row">` + options.map(item => {
    const label = Array.isArray(item) ? item[0] : item;
    const icon = Array.isArray(item) ? item[1] : "";
    const isSelected = multi ? selected.includes(label) : selected === label;
    return `<button type="button" class="choice ${isSelected ? "selected" : ""}" data-choice="${escapeHtml(label)}" data-field="${field}" data-multi="${multi ? "1" : "0"}">${icon ? icon + " " : ""}${escapeHtml(label)}</button>`;
  }).join("") + `</div>`;
}

function postmark(entry, big) {
  const d = entry.date ? new Date(entry.date + "T00:00:00") : null;
  const day = d ? d.getDate() : "--";
  const month = d ? d.toLocaleDateString(undefined, { month: "short" }).toUpperCase() : "---";
  const year = d ? d.getFullYear() : "----";
  const id = "pm-" + entry.id;
  const text = ((entry.town || "TONIGHT'S STOP") + " • " + (entry.route || "CAMINO")).toUpperCase();

  return `
    <div class="postmark ${big ? "detail-postmark" : ""}">
      <svg viewBox="0 0 160 160">
        <defs>
          <path id="${id}" d="M 80,140 a 60,60 0 1,1 0,-120 a 60,60 0 1,1 0,120"></path>
        </defs>
        <circle cx="80" cy="80" r="72" class="pm-ring"></circle>
        <circle cx="80" cy="80" r="50" class="pm-inner"></circle>
        <text class="pm-text" text-anchor="middle" dominant-baseline="middle">
          <textPath href="#${id}" startOffset="50%">${escapeHtml(text)}</textPath>
        </text>
        <text x="80" y="74" text-anchor="middle" class="pm-day">${day}</text>
        <text x="80" y="95" text-anchor="middle" class="pm-month">${month}</text>
        <text x="80" y="112" text-anchor="middle" class="pm-year">${year}</text>
      </svg>
    </div>
  `;
}

function render() {
  closeMenu();

  if (state.view === "journal") renderJournal();
  if (state.view === "entry") renderEntry();
  if (state.view === "new") renderForm();
  if (state.view === "settings") renderSettings();
  if (state.view === "packing") renderPacking();
  if (state.view === "travel") renderTravel();
  if (state.view === "printEntry") renderPrint([activeEntry()], "page");
  if (state.view === "printBook") renderPrint([...sortedEntries()].reverse(), "book");
}

function startNewEntry() {
  state.draft = {
    id: uid(),
    date: todayISO(),
    route: settings.currentRoute || "Camino Francés",
    town: "",

function saveDraftFromInputs() {
  const d = state.draft;

  d.date = document.getElementById("dateInput")?.value || d.date;
  d.distanceValue = document.getElementById("distanceInput")?.value || "";
  d.notes = document.getElementById("notesInput")?.value || "";

  const townSelect = document.getElementById("townSelect");
  const townCustom = document.getElementById("townCustomInput");

  if (townSelect) {
    d.town = townSelect.value === "__custom__"
      ? (townCustom?.value || "").trim()
      : townSelect.value.trim();
  }

  const albergueSelect = document.getElementById("albergueSelect");
  const albergueCustom = document.getElementById("albergueCustomInput");

  if (albergueSelect) {
    d.albergue = albergueSelect.value === "__custom__"
      ? (albergueCustom?.value || "").trim()
      : albergueSelect.value.trim();
  }

  addCustomTown(d.route, d.town);
  addCustomAlbergue(d.town, d.albergue);
}

function bindForm() {
  const d = state.draft;
  let holdTimer = null;

  function startHold(delta) {
    bumpDistance(delta);
    clearInterval(holdTimer);
    holdTimer = setInterval(() => bumpDistance(delta), 70);
  }

  function stopHold() {
    clearInterval(holdTimer);
    holdTimer = null;
  }

  document.getElementById("cancelFormBtn").onclick = () => {
    state.draft = null;
    state.pendingPersonPhoto = null;
    state.pendingPersonName = "";
    state.townCustomMode = false;
    state.albergueCustomMode = false;
    history.back();
  };

 

  document.getElementById("dateInput").oninput = e => {
    d.date = e.target.value;
  };

  document.getElementById("townSelect").onchange = e => {
    if (e.target.value === "__custom__") {
      state.townCustomMode = true;
      d.town = "";
      d.albergue = "";
      state.albergueCustomMode = false;
    } else {
      state.townCustomMode = false;
      d.town = e.target.value;
      d.albergue = "";
      state.albergueCustomMode = false;
    }
    renderForm();
  };

  const townCustom = document.getElementById("townCustomInput");
  if (townCustom) {
    townCustom.oninput = e => {
      d.town = e.target.value;
    };
  }

  document.getElementById("albergueSelect").onchange = e => {
    if (e.target.value === "__custom__") {
      state.albergueCustomMode = true;
      d.albergue = "";
    } else {
      state.albergueCustomMode = false;
      d.albergue = e.target.value;
    }
    renderForm();
  };

  const albergueCustom = document.getElementById("albergueCustomInput");
  if (albergueCustom) {
    albergueCustom.oninput = e => {
      d.albergue = e.target.value;
    };
  }

  document.getElementById("distanceInput").oninput = e => {
    d.distanceValue = e.target.value;
  };

  document.getElementById("notesInput").oninput = e => {
    d.notes = e.target.value;
  };

  const minus = document.getElementById("distanceMinus");
  const plus = document.getElementById("distancePlus");

  minus.onpointerdown = () => startHold(-0.1);
  plus.onpointerdown = () => startHold(0.1);

  minus.onpointerup = stopHold;
  plus.onpointerup = stopHold;
  minus.onpointerleave = stopHold;
  plus.onpointerleave = stopHold;
  minus.onpointercancel = stopHold;
  plus.onpointercancel = stopHold;

  document.querySelectorAll("[data-unit]").forEach(btn => {
    btn.onclick = () => {
      const newUnit = btn.dataset.unit;
      if (newUnit === d.distanceUnit) return;

      const defaults = { mi: "10", km: "15" };
      const atDefault = d.distanceValue === defaults[d.distanceUnit] || d.distanceValue === "";

      d.distanceUnit = newUnit;
      if (atDefault) {
        d.distanceValue = defaults[newUnit];
      }

      renderForm();
    };
  });

  document.querySelectorAll("[data-choice]").forEach(btn => {
    btn.onclick = () => {
      const field = btn.dataset.field;
      const value = btn.dataset.choice;
      const multi = btn.dataset.multi === "1";

      if (multi) {
        d[field] = d[field] || [];
        if (d[field].includes(value)) {
          d[field] = d[field].filter(x => x !== value);
        } else {
          d[field].push(value);
        }
      } else {
        d[field] = d[field] === value ? "" : value;
      }

      renderForm();
    };
  });

  document.getElementById("addPersonBtn").onclick = addPerson;
  document.getElementById("personInput").oninput = e => {
    state.pendingPersonName = e.target.value;
  };
  document.getElementById("personInput").onkeydown = e => {
    if (e.key === "Enter") {
      e.preventDefault();
      addPerson();
    }
  };

  document.querySelectorAll("[data-remove-person]").forEach(btn => {
    btn.onclick = () => {
      d.people = d.people.filter(p => p.id !== btn.dataset.removePerson);
      renderForm();
    };
  });

  document.getElementById("personPhotoBtn").onclick = () => document.getElementById("personPhotoInput").click();

  document.getElementById("personPhotoInput").onchange = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      state.pendingPersonPhoto = reader.result;
      renderForm();
    };
    reader.readAsDataURL(file);
  };

  document.getElementById("addPhotoBtn").onclick = () => document.getElementById("photoInput").click();
  document.getElementById("photoInput").onchange = e => handlePhotos(e.target.files);

  document.querySelectorAll("[data-remove-photo]").forEach(btn => {
    btn.onclick = () => {
      d.photos = d.photos.filter(p => p.id !== btn.dataset.removePhoto);
      renderForm();
    };
  });

  bindStops();

  document.getElementById("saveEntryBtn").onclick = () => {
    saveDraftFromInputs();

    if (!d.town || !d.town.trim()) {
      alert("Choose or type tonight’s town / city before saving.");
      return;
    }

    settings.currentRoute = d.route;
    persistSettings();

    const exists = entries.some(e => e.id === d.id);
    if (exists) {
      entries = entries.map(e => e.id === d.id ? d : e);
    } else {
      entries.push(d);
    }

    persistEntries();
    state.draft = null;
    state.pendingPersonPhoto = null;
    state.pendingPersonName = "";
    state.townCustomMode = false;
    state.albergueCustomMode = false;
    toast("Saved");
    setView("journal");
  };
}

function bumpDistance(delta) {
  const d = state.draft;
  let n = parseFloat(d.distanceValue || "0");
  if (isNaN(n)) n = 0;

  n = Math.max(0, Math.round((n + delta) * 10) / 10);
  d.distanceValue = n.toFixed(1);

  const input = document.getElementById("distanceInput");
  if (input) input.value = d.distanceValue;
}
function addPerson() {
  const name = (state.pendingPersonName || "").trim();
  if (!name) return;

  if (!state.draft.people.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    state.draft.people.push({ id: uid(), name, photo: state.pendingPersonPhoto || null });
  }

  state.pendingPersonName = "";
  state.pendingPersonPhoto = null;
  renderForm();
}

function handlePhotos(files) {
  const arr = Array.from(files || []).slice(0, 8 - state.draft.photos.length);
  if (!arr.length) return;

  let remaining = arr.length;
  arr.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      state.draft.photos.push({ id: uid(), src: reader.result });
      remaining--;
      if (remaining === 0) renderForm();
    };
    reader.readAsDataURL(file);
  });
}

function bindStops() {
  const d = state.draft;

  const addBtn = document.getElementById("addStopBtn");
  if (addBtn) {
    addBtn.onclick = () => {
      state.stopDraft = { id: uid(), name: "", type: "Café", area: "", notes: "", photo: null };
      renderForm();
    };
  }

  document.querySelectorAll("[data-remove-stop]").forEach(btn => {
    btn.onclick = () => {
      d.stops = d.stops.filter(s => s.id !== btn.dataset.removeStop);
      renderForm();
    };
  });

  if (!state.stopDraft) return;

  const stop = state.stopDraft;

  document.getElementById("stopName").oninput = e => stop.name = e.target.value;
  document.getElementById("stopType").onchange = e => stop.type = e.target.value;
  document.getElementById("stopArea").oninput = e => stop.area = e.target.value;
  document.getElementById("stopNotes").oninput = e => stop.notes = e.target.value;

  document.getElementById("cancelStopBtn").onclick = () => {
    state.stopDraft = null;
    renderForm();
  };

  document.getElementById("saveStopBtn").onclick = () => {
    if (!stop.name.trim() && !stop.notes.trim()) return;
    stop.name = stop.name.trim();
    d.stops.push(stop);
    state.stopDraft = null;
    renderForm();
  };

  document.getElementById("stopPhotoBtn").onclick = () => document.getElementById("stopPhotoInput").click();

  const removePhoto = document.getElementById("removeStopPhotoBtn");
  if (removePhoto) {
    removePhoto.onclick = () => {
      stop.photo = null;
      renderForm();
    };
  }

  document.getElementById("stopPhotoInput").onchange = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      stop.photo = reader.result;
      renderForm();
    };
    reader.readAsDataURL(file);
  };
}

function layoutFor(entriesToPrint, i, entry) {
  if (state.printLayout !== "mixed") return Number(state.printLayout);

  let layout = (hashLayout(entry.id) + i) % 5;

  if (i > 0) {
    const prev = (hashLayout(entriesToPrint[i - 1].id) + i - 1) % 5;
    if (layout === prev) layout = (layout + 1) % 5;
  }

  return layout;
}

function backupData() {
  const payload = {
    app: "camino-journal",
    version: 3,
    exportedAt: new Date().toISOString(),
    entries,
    custom,
    packing,
    travel,
    settings
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "camino-journal-backup-" + todayISO() + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("Backup created");
}

function restoreData(file) {
  const reader = new FileReader();

  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.entries)) throw new Error("Bad backup");

      entries = data.entries.map(migrateEntry);
      custom = data.custom || data.customRoutes || {};
      packing = Array.isArray(data.packing) ? data.packing : Array.isArray(data.packingList) ? data.packingList : packing;
      travel = Array.isArray(data.travel) ? data.travel : Array.isArray(data.travelLegs) ? data.travelLegs : travel;
      settings = data.settings || settings;

      persistEntries();
      persistCustom();
      persistPacking();
      persistTravel();
      persistSettings();

      toast("Restored " + entries.length + " entries");
      setView("journal");
    } catch (e) {
      toast("Couldn't read that backup file.", true);
    }
  };

  reader.readAsText(file);
}
