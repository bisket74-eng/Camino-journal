<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Camino Journal</title>

<meta name="description" content="A daily Camino journal, travel log, scrapbook, and printable book." />
<meta name="theme-color" content="#efe4cf" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Camino Journal" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23efe4cf'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-size='58'%3E%F0%9F%90%9A%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Courier+Prime:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --sand: #efe4cf;
  --sand-dark: #dfcba8;
  --paper: #fbf5e8;
  --paper-soft: #f5ead6;
  --ink: #2d241d;
  --muted: #776650;
  --blue: #2f496e;
  --red: #993a30;
  --green: #4f684f;
  --gold: #b98b3b;
  --line: rgba(45,36,29,.18);
  --shadow: 0 12px 32px rgba(62,47,29,.14);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  color: var(--ink);
  font-family: "Libre Franklin", system-ui, sans-serif;
  font-size: 16px;
  background:
    radial-gradient(circle at 18% 4%, rgba(255,255,255,.55), transparent 32%),
    radial-gradient(circle at 85% 70%, rgba(153,58,48,.08), transparent 34%),
    linear-gradient(135deg, #eadbc0, #f7eedb 48%, #e2ceaa);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: .18;
  background-image:
    linear-gradient(90deg, rgba(45,36,29,.05) 1px, transparent 1px),
    linear-gradient(rgba(45,36,29,.04) 1px, transparent 1px);
  background-size: 28px 28px;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

.airmail-border {
  height: 10px;
  width: 100%;
  background: repeating-linear-gradient(
    -45deg,
    var(--red) 0px,
    var(--red) 10px,
    var(--paper) 10px,
    var(--paper) 15px,
    var(--blue) 15px,
    var(--blue) 25px,
    var(--paper) 25px,
    var(--paper) 30px
  );
}

.app-header {
  text-align: center;
  padding: 26px 16px 21px;
  border-bottom: 1px solid rgba(45,36,29,.16);
  background: linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,0));
}

.header-mark {
  font-size: 31px;
  line-height: 1;
  margin-bottom: 5px;
  filter: drop-shadow(0 2px 2px rgba(62,47,29,.18));
}

.app-title {
  margin: 0;
  font-family: "Cormorant Garamond", serif;
  font-size: 42px;
  line-height: .95;
  letter-spacing: .8px;
  color: var(--ink);
}

.app-subtitle {
  margin-top: 8px;
  color: var(--blue);
  font-family: "Courier Prime", monospace;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2.4px;
}

.header-actions {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.btn {
  border: 1px solid rgba(47,73,110,.28);
  background: rgba(251,245,232,.82);
  color: var(--blue);
  border-radius: 5px;
  padding: 9px 13px;
  cursor: pointer;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 2px 6px rgba(62,47,29,.07);
}

.btn:hover {
  background: #fffdf8;
}

.btn-red {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

.btn-danger {
  color: var(--red);
  border-color: rgba(153,58,48,.45);
  background: transparent;
}

.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 110px;
  position: relative;
}

.card {
  background: rgba(251,245,232,.94);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 10px;
  padding: 22px 20px;
}

.route-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  padding: 16px 17px;
}

.route-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 25px;
  font-weight: 700;
  line-height: 1.05;
}

.route-meta {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}

.empty {
  text-align: center;
  padding: 48px 22px;
  color: var(--blue);
}

.empty-icon {
  font-size: 38px;
}

.empty p {
  margin: 12px 0 0;
  font-size: 17px;
}

.empty .soft {
  color: var(--muted);
  font-family: "Libre Baskerville", serif;
  font-style: italic;
  font-size: 14px;
}

.entry-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.entry-card {
  width: 100%;
  text-align: left;
  display: flex;
  gap: 16px;
  align-items: center;
  position: relative;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: rgba(251,245,232,.96);
  padding: 14px 14px 14px 12px;
  box-shadow: 0 8px 22px rgba(62,47,29,.1);
  cursor: pointer;
}

.entry-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 12px;
  bottom: 12px;
  width: 3px;
  border-radius: 3px;
  background: linear-gradient(var(--red), var(--gold));
}

.entry-body {
  flex: 1;
  min-width: 0;
}

.entry-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.05;
}

.entry-meta {
  font-family: "Courier Prime", monospace;
  color: var(--blue);
  font-size: 12px;
  margin-top: 5px;
}

.entry-snippet {
  margin-top: 9px;
  font-family: "Libre Baskerville", serif;
  font-size: 14px;
  line-height: 1.55;
  color: rgba(45,36,29,.76);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.fab {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 58px;
  height: 58px;
  border: none;
  border-radius: 50%;
  background: var(--red);
  color: white;
  font-size: 31px;
  line-height: 1;
  box-shadow: 0 8px 20px rgba(62,47,29,.32);
  cursor: pointer;
}

@media (min-width: 700px) {
  .fab {
    right: calc(50% - 320px - 72px);
  }
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  padding: 7px 0 15px;
  color: var(--blue);
  cursor: pointer;
  font-weight: 700;
}

.section-title {
  margin: 0 0 8px;
  font-family: "Cormorant Garamond", serif;
  font-size: 30px;
  line-height: 1;
}

.panel-sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
  margin: 6px 0 20px;
}

.field {
  margin-bottom: 20px;
}

.field-label,
.detail-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: "Courier Prime", monospace;
  color: var(--blue);
  font-size: 13px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 9px;
}

.input,
.textarea,
.select {
  width: 100%;
  border: 1px solid rgba(45,36,29,.24);
  background: #fffdf8;
  border-radius: 5px;
  color: var(--ink);
  padding: 12px 13px;
  font-size: 16px;
}

.textarea {
  min-height: 150px;
  resize: vertical;
  line-height: 1.75;
  font-family: "Libre Baskerville", serif;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 31px,
    rgba(47,73,110,.12) 32px
  );
}

.input:focus,
.textarea:focus,
.select:focus {
  outline: 2px solid rgba(47,73,110,.35);
  outline-offset: 1px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 500px) {
  .field-row {
    grid-template-columns: 1fr;
  }
}

.choice-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.choice {
  border: 1px solid rgba(45,36,29,.22);
  background: #fffdf8;
  color: var(--ink);
  border-radius: 4px;
  padding: 9px 11px;
  cursor: pointer;
}

.choice.selected {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.distance-box {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: stretch;
}

@media (max-width: 500px) {
  .distance-box {
    grid-template-columns: 1fr;
  }
}

.distance-control {
  display: flex;
  border: 1px solid rgba(45,36,29,.24);
  border-radius: 5px;
  background: #fffdf8;
  overflow: hidden;
}

.spin {
  width: 44px;
  border: none;
  background: rgba(47,73,110,.08);
  color: var(--blue);
  font-size: 24px;
  cursor: pointer;
}

.distance-input {
  flex: 1;
  min-width: 0;
  border: none;
  background: transparent;
  padding: 12px 10px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
}

.unit-toggle {
  display: flex;
  border: 1px solid rgba(45,36,29,.24);
  border-radius: 5px;
  background: #fffdf8;
  overflow: hidden;
}

.unit-toggle button {
  border: none;
  background: transparent;
  color: var(--muted);
  font-weight: 700;
  padding: 12px 14px;
  cursor: pointer;
}

.unit-toggle button.active {
  background: var(--blue);
  color: white;
}

.detail-title {
  margin: 12px 0 2px;
  font-family: "Cormorant Garamond", serif;
  font-size: 36px;
  line-height: 1;
}

.detail-meta {
  color: var(--blue);
  font-family: "Courier Prime", monospace;
  font-size: 13px;
  margin-bottom: 14px;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  border-radius: 4px;
  background: rgba(47,73,110,.08);
  border: 1px solid rgba(47,73,110,.18);
  color: var(--blue);
  padding: 5px 9px;
  font-size: 13px;
  font-weight: 700;
}

.detail-section {
  margin-top: 20px;
}

.notes-display {
  white-space: pre-wrap;
  font-family: "Libre Baskerville", serif;
  font-size: 16px;
  line-height: 1.85;
  color: #372d24;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
}

.photo-tile {
  position: relative;
  aspect-ratio: 1;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.4);
}

.photo-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  background: rgba(0,0,0,.62);
  color: white;
  cursor: pointer;
}

.photo-add {
  aspect-ratio: 1;
  border-radius: 6px;
  border: 1.5px dashed rgba(47,73,110,.36);
  background: rgba(47,73,110,.04);
  color: var(--blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  font-weight: 700;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 24px;
}

.action-row .btn {
  flex: 1;
  min-width: 120px;
}

.postmark {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
}

.detail-postmark {
  width: 98px;
  height: 98px;
}

.postmark svg {
  width: 100%;
  height: 100%;
}

.pm-ring {
  fill: none;
  stroke: var(--blue);
  stroke-width: 1.8;
}

.pm-inner {
  fill: none;
  stroke: var(--blue);
  stroke-width: 1.35;
}

.pm-text {
  font-family: "Courier Prime", monospace;
  font-size: 10.6px;
  letter-spacing: .85px;
  fill: var(--blue);
  font-weight: 700;
}

.pm-day {
  font-family: "Courier Prime", monospace;
  font-size: 28px;
  fill: var(--red);
  font-weight: 700;
}

.pm-month,
.pm-year {
  font-family: "Courier Prime", monospace;
  font-size: 11px;
  letter-spacing: 1px;
  fill: var(--blue);
  font-weight: 700;
}

.stop-card {
  border: 1px solid var(--line);
  background: rgba(255,255,255,.45);
  border-radius: 7px;
  padding: 13px;
  margin-bottom: 10px;
}

.stop-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.stop-name {
  font-family: "Cormorant Garamond", serif;
  font-size: 23px;
  font-weight: 700;
}

.stop-meta {
  color: var(--muted);
  font-size: 13px;
  margin-top: 2px;
}

.stop-notes {
  font-family: "Libre Baskerville", serif;
  font-size: 14px;
  line-height: 1.6;
  margin-top: 8px;
}

.stop-photo {
  margin-top: 9px;
  width: 94px;
  height: 94px;
  object-fit: cover;
  border-radius: 5px;
  border: 1px solid var(--line);
}

.person-row {
  display: flex;
  gap: 8px;
}

.person-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.person-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(79,104,79,.1);
  border: 1px solid rgba(79,104,79,.25);
  color: var(--green);
  padding: 5px 9px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
}

.person-tag button {
  border: none;
  background: none;
  color: var(--green);
  cursor: pointer;
  padding: 0;
}

.person-photo {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  object-fit: cover;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 9px 18px;
  border-radius: 22px;
  z-index: 80;
  box-shadow: 0 8px 20px rgba(0,0,0,.24);
  font-size: 13px;
}

.toast.error {
  background: var(--red);
}

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.86);
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.lightbox img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 6px;
}

.hidden {
  display: none !important;
}

.menu-wrap {
  position: relative;
}

.menu {
  position: absolute;
  top: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: #fffdf8;
  border: 1px solid var(--line);
  border-radius: 7px;
  box-shadow: 0 12px 24px rgba(62,47,29,.22);
  z-index: 50;
  min-width: 200px;
  overflow: hidden;
}

.menu button {
  width: 100%;
  border: none;
  background: none;
  text-align: left;
  padding: 12px 14px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
}

.menu button:hover {
  background: rgba(185,139,59,.12);
}

.menu button + button {
  border-top: 1px solid rgba(45,36,29,.09);
}

.packing-group {
  border: 1px solid var(--line);
  border-radius: 7px;
  margin-bottom: 12px;
  overflow: hidden;
  background: rgba(255,255,255,.35);
}

.packing-head {
  width: 100%;
  border: none;
  background: rgba(47,73,110,.06);
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 13px 14px;
  cursor: pointer;
  font-weight: 700;
  color: var(--ink);
}

.packing-body {
  padding: 10px 14px 14px;
}

.packing-row {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,36,29,.07);
}

.packing-row:last-child {
  border-bottom: none;
}

.check-btn {
  width: 23px;
  height: 23px;
  border-radius: 4px;
  border: 1.5px solid rgba(45,36,29,.35);
  background: white;
  cursor: pointer;
}

.check-btn.checked {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

.pack-name {
  flex: 1;
}

.pack-name.checked {
  text-decoration: line-through;
  opacity: .55;
}

.travel-card {
  width: 100%;
  text-align: left;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.42);
  border-radius: 6px;
  padding: 13px;
  margin-bottom: 10px;
  cursor: pointer;
}

.travel-title {
  font-weight: 700;
}

.travel-meta {
  color: var(--blue);
  font-size: 13px;
  margin-top: 4px;
}

.print-shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 18px 12px 60px;
}

.print-toolbar {
  background: rgba(251,245,232,.96);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 16px;
}

.print-page {
  width: min(850px, 100%);
  min-height: 1100px;
  margin: 0 auto 22px;
  background: #fff7e8;
  color: #2d241b;
  box-shadow: 0 8px 25px rgba(0,0,0,.15);
  border: 1px solid rgba(45,36,29,.12);
  position: relative;
  overflow: hidden;
  padding: 54px;
  page-break-after: always;
}

.print-page::before {
  content: "";
  position: absolute;
  inset: 18px;
  border: 1px solid rgba(185,139,59,.28);
  pointer-events: none;
}

.print-kicker {
  font-family: "Courier Prime", monospace;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--blue);
}

.print-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 48px;
  line-height: .95;
  margin: 8px 0 10px;
}

.print-meta {
  font-family: "Courier Prime", monospace;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 24px;
}

.print-notes {
  font-family: "Libre Baskerville", serif;
  font-size: 17px;
  line-height: 1.9;
  white-space: pre-wrap;
}

.print-photo {
  object-fit: cover;
  border: 8px solid white;
  box-shadow: 0 6px 14px rgba(45,36,29,.18);
  background: #ddd;
}

.layout-postcard .photo-area {
  display: grid;
  grid-template-columns: 1.2fr .8fr;
  gap: 16px;
  margin: 20px 0;
}

.layout-postcard .photo-area img:first-child {
  height: 330px;
}

.layout-postcard .side-photos {
  display: grid;
  gap: 16px;
}

.layout-postcard .side-photos img {
  height: 155px;
}

.layout-scrapbook .collage {
  height: 420px;
  position: relative;
  margin: 20px 0;
}

.polaroid {
  position: absolute;
  background: white;
  padding: 10px 10px 34px;
  box-shadow: 0 8px 17px rgba(45,36,29,.2);
  width: 44%;
  height: 245px;
}

.polaroid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.polaroid.p1 {
  left: 4%;
  top: 10px;
  transform: rotate(-5deg);
}

.polaroid.p2 {
  right: 5%;
  top: 35px;
  transform: rotate(4deg);
}

.polaroid.p3 {
  left: 28%;
  bottom: 0;
  transform: rotate(1deg);
}

.layout-log .log-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin: 22px 0;
}

.log-box {
  border: 1px solid rgba(45,36,29,.18);
  padding: 14px;
  background: rgba(255,255,255,.4);
}

.log-label {
  font-family: "Courier Prime", monospace;
  color: var(--blue);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.log-value {
  font-family: "Cormorant Garamond", serif;
  font-size: 25px;

 <div class="header-actions">

<script>
const ROUTES = {

const SEED_ALBERGUES = {

const WEATHER_OPTIONS = [
  ["Sunny", "☀️"],
  ["Partly Cloudy", "⛅"],
  ["Overcast", "☁️"],
  ["Light Rain", "🌦️"],
  ["Heavy Rain", "🌧️"],

];

const FEELING_OPTIONS = [
  "Energized", "Tired", "Sore", "Peaceful", "Joyful", "Homesick",
  "Inspired", "Overwhelmed", "Grateful", "Lonely", "Proud", "Content"
];

const STOP_TYPES = [
  "Café", "Lunch", "Store", "Church", "Viewpoint", "Rest Stop",
  "Landmark", "Albergue Visit", "Other"
];

const DEFAULT_PACKING = [
  ["Documents & Money", [
    "Passport / ID", "Pilgrim Credential (Credencial)", "Travel insurance info",
    "Photocopies of documents", "Cash & cards", "Phone + charger"
  ]],
  ["Backpack & Sleep", [
    "Backpack (30-40L)", "Backpack rain cover", "Sleeping bag liner / lightweight sleeping bag",
    "Earplugs", "Eye mask", "Packing cubes / stuff sacks"
  ]],
  ["Footwear", [
    "Broken-in hiking shoes or trail runners", "Camp shoes / sandals",
    "Hiking socks (3-4 pairs)", "Liner socks (optional)"
  ]],
  ["Clothing", [
    "Quick-dry t-shirts (2-3)", "Long-sleeve quick-dry layer",
    "Hiking pants or leggings (2 pairs)", "Underwear (3-4 pairs)",
    "Sports bra(s)", "Fleece or warm mid-layer", "Light rain jacket / poncho",
    "Hat or buff", "Sleepwear", "Swimsuit (optional)"
  ]],
  ["Toiletries & First Aid", [
    "Travel-size toiletries", "Sunscreen", "Lip balm with SPF",
    "Blister plasters (Compeed)", "Small first aid kit", "Personal medication",
    "Quick-dry towel", "Laundry soap / detergent sheets", "Clothespins or small clothesline"
  ]],
  ["Tech & Extras", [
    "Headlamp or small flashlight", "Power bank", "EU plug adapter",
    "Sunglasses", "Refillable water bottle", "Trekking poles",
    "Guidebook or app", "Small notebook & pen", "Spork / small utensil"
  ]]
];

const TRAVEL_TYPES = ["Flight", "Train", "Bus", "Taxi / Rideshare", "Ferry", "Other"];

const KEYS = {
  entries: "camino-journal-entries-v3",
  oldEntries: "camino-journal-entries-v1",
  custom: "camino-journal-custom-v3",
  packing: "camino-journal-packing-v3",
  travel: "camino-journal-travel-v3",
  settings: "camino-journal-settings-v3"
};

let state = {
  view: "journal",
  activeId: null,
  draft: null,
  stopDraft: null,
  travelDraft: null,
  printMode: null,
  printLayout: "mixed",
  packingOpen: {}
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function save(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    toast("Storage is full — backup your journal soon.", true);
    return false;
  }
}

function makeDefaultPacking() {
  return DEFAULT_PACKING.map(group => ({
    category: group[0],
    items: group[1].map(name => ({ id: uid(), name, checked: false }))
  }));
}

let entries = load(KEYS.entries, null);
if (!entries) {
  const old = load(KEYS.oldEntries, []);
  entries = Array.isArray(old) ? old.map(migrateEntry) : [];
  save(KEYS.entries, entries);
}

let custom = load(KEYS.custom, {});
let packing = load(KEYS.packing, makeDefaultPacking());
let travel = load(KEYS.travel, []);
let settings = load(KEYS.settings, { currentRoute: "Camino Francés" });

function migrateEntry(e) {
  return {
    id: e.id || uid(),
    date: e.date || todayISO(),
    route: e.route || settings.currentRoute || "Camino Francés",
    town: e.town || "",
    albergue: e.albergue || "",
    distanceValue: e.distanceValue || (e.distanceKm === "Other" ? e.distanceCustom : e.distanceKm) || "",
    distanceUnit: e.distanceUnit || (e.distanceKm ? "km" : "mi"),
    weather: e.weather || [],
    feelings: e.feelings || [],
    stops: e.stops || [],
    people: Array.isArray(e.people) ? e.people.map(p => typeof p === "string" ? { id: uid(), name: p, photo: null } : p) : [],
    photos: e.photos || [],
    notes: e.notes || ""
  };
}

function persistEntries() {
  save(KEYS.entries, entries);
}

function persistSettings() {
  save(KEYS.settings, settings);
}

function persistCustom() {
  save(KEYS.custom, custom);
}

function persistPacking() {
  save(KEYS.packing, packing);
}

function persistTravel() {
  save(KEYS.travel, travel);
}

function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (isError ? " error" : "");
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => el.className = "toast hidden", 1800);
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, {
    weekday: "short",
    month: "short",
    day: "numeric",
    year: "numeric"
  });
}

function formatDateTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
    " · " +
    d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

function distanceText(entry) {
  if (!entry || !entry.distanceValue) return "";
  const num = Number(entry.distanceValue);
  const clean = isNaN(num) ? entry.distanceValue : num.toFixed(1).replace(".0", "");
  return clean + " " + (entry.distanceUnit || "mi");
}

function getTownOptions(route) {
  const base = ROUTES[route] || [];
  const extra = custom[route]?.towns || [];
  return [...base, ...extra.filter(t => !base.includes(t))];
}

function getAlbergueOptions(town) {
  const base = SEED_ALBERGUES[town] || [];
  const extra = custom.__albergues?.[town] || [];
  return [...base, ...extra.filter(a => !base.includes(a))];
}

function addCustomTown(route, town) {
  if (!route || !town) return;
  if ((ROUTES[route] || []).includes(town)) return;
  if (!custom[route]) custom[route] = { towns: [] };
  if (!custom[route].towns.includes(town)) custom[route].towns.push(town);
  persistCustom();
}

function addCustomAlbergue(town, albergue) {
  if (!town || !albergue) return;
  if ((SEED_ALBERGUES[town] || []).includes(albergue)) return;
  if (!custom.__albergues) custom.__albergues = {};
  if (!custom.__albergues[town]) custom.__albergues[town] = [];
  if (!custom.__albergues[town].includes(albergue)) custom.__albergues[town].push(albergue);
  persistCustom();
}
function previousTownForEntry(entry) {
  const sameRouteEntries = entries
    .filter(e => e.id !== entry.id && e.route === entry.route && e.date <= entry.date && e.town)
    .sort((a, b) => a.date < b.date ? 1 : -1);

  return sameRouteEntries[0]?.town || "";
}

function naturalList(items) {
  items = (items || []).filter(Boolean);

  if (items.length === 0) return "";
  if (items.length === 1) return items[0];
  if (items.length === 2) return items[0] + " and " + items[1];

  return items.slice(0, -1).join(", ") + ", and " + items[items.length - 1];
}

function buildPrettyJournalText(entry) {
  const fromTown = previousTownForEntry(entry);
  const toTown = entry.town || "tonight’s stop";
  const distance = distanceText(entry);
  const albergue = entry.albergue || "";
  const people = (entry.people || []).map(p => p.name).filter(Boolean);
  const stops = entry.stops || [];
  const feelings = entry.feelings || [];
  const weather = entry.weather || [];
  const notes = (entry.notes || "").trim();

  const lines = [];

  lines.push("Dear Camino,");

  let opening = "Today, ";

  if (distance && fromTown && toTown) {
    opening += "I walked " + distance + " from " + fromTown + " to " + toTown + ".";
  } else if (distance && toTown) {
    opening += "I walked " + distance + " and landed in " + toTown + ".";
  } else if (fromTown && toTown) {
    opening += "I made my way from " + fromTown + " to " + toTown + ".";
  } else if (toTown) {
    opening += "I landed in " + toTown + ".";
  } else {
    opening += "I walked another day along the Way.";
  }

  lines.push(opening);

  if (albergue) {
    lines.push("Tonight I am staying at " + albergue + ".");
  }

  if (weather.length) {
    lines.push("The weather felt like " + naturalList(weather.map(w => w.toLowerCase())) + ".");
  }

  if (feelings.length) {
    lines.push("I was feeling " + naturalList(feelings.map(f => f.toLowerCase())) + " as the day unfolded.");
  }

  if (stops.length) {
    stops.forEach(stop => {
      let stopLine = "";

      if (stop.name && stop.type) {
        stopLine = "I stopped at " + stop.name + ", a " + stop.type.toLowerCase();
      } else if (stop.name) {
        stopLine = "I stopped at " + stop.name;
      } else if (stop.type) {
        stopLine = "I stopped at a " + stop.type.toLowerCase();
      }

      if (stop.area) {
        stopLine += " near " + stop.area;
      }

      if (stopLine) {
        stopLine += ".";
        lines.push(stopLine);
      }

      if (stop.notes) {
        lines.push(stop.notes.trim());
      }
    });
  }

  if (people.length) {
    lines.push("Along the way, I met " + naturalList(people) + ".");
  }

  if (notes) {
    lines.push(notes);
  }

  lines.push("Buen Camino.");

  return lines.join("\n\n");
}
function hashLayout(value) {
  let h = 0;
  String(value || "").split("").forEach(ch => {
    h = (h * 31 + ch.charCodeAt(0)) % 9973;
  });
  return h;
}

function app() {
  return document.getElementById("app");
}

function setView(view) {
  state.view = view;
  render();
}

function activeEntry() {
  return entries.find(e => e.id === state.activeId);
}

function sortedEntries() {
  return [...entries].sort((a, b) => a.date < b.date ? 1 : -1);
}

function routeOptionsHtml(selected) {
  return Object.keys(ROUTES).map(route =>
    `<option value="${escapeHtml(route)}" ${route === selected ? "selected" : ""}>${escapeHtml(route)}</option>`
  ).join("");
}

function datalistHtml(id, options) {
  return `<datalist id="${id}">${options.map(o => `<option value="${escapeHtml(o)}"></option>`).join("")}</datalist>`;
}
 function selectOptions(options, current, placeholder) {
  const safeOptions = options || [];
  const currentIsCustom = current && !safeOptions.includes(current);

  return `
    <option value="">${escapeHtml(placeholder || "Select…")}</option>
    ${safeOptions.map(opt => `
      <option value="${escapeHtml(opt)}" ${opt === current ? "selected" : ""}>
        ${escapeHtml(opt)}
      </option>
    `).join("")}
    <option value="__custom__" ${currentIsCustom ? "selected" : ""}>Type my own…</option>
  `;
} 

function choiceButtons(options, selected, field, multi) {
  selected = selected || [];
  return `<div class="choice-row">` + options.map(item => {
    const label = Array.isArray(item) ? item[0] : item;
    const icon = Array.isArray(item) ? item[1] : "";
    const isSelected = multi ? selected.includes(label) : selected === label;
    return `<button type="button" class="choice ${isSelected ? "selected" : ""}" data-choice="${escapeHtml(label)}" data-field="${field}" data-multi="${multi ? "1" : "0"}">${icon ? icon + " " : ""}${escapeHtml(label)}</button>`;
  }).join("") + `</div>`;
}

function postmark(entry, big) {
  const d = entry.date ? new Date(entry.date + "T00:00:00") : null;
  const day = d ? d.getDate() : "--";
  const month = d ? d.toLocaleDateString(undefined, { month: "short" }).toUpperCase() : "---";
  const year = d ? d.getFullYear() : "----";
  const id = "pm-" + entry.id;
  const text = ((entry.town || "TONIGHT'S STOP") + " • " + (entry.route || "CAMINO")).toUpperCase();

  return `
    <div class="postmark ${big ? "detail-postmark" : ""}">
      <svg viewBox="0 0 140 140">
        <defs>
          <path id="${id}" d="M 70,70 m -57,0 a 57,57 0 1,1 114,0 a 57,57 0 1,1 -114,0"></path>
        </defs>
        <circle cx="70" cy="70" r="65" class="pm-ring"></circle>
        <circle cx="70" cy="70" r="47" class="pm-inner"></circle>
        <text class="pm-text">
          <textPath href="#${id}" startOffset="3%">${escapeHtml(text)}</textPath>
        </text>
        <text x="70" y="65" text-anchor="middle" class="pm-day">${day}</text>
        <text x="70" y="84" text-anchor="middle" class="pm-month">${month}</text>
        <text x="70" y="99" text-anchor="middle" class="pm-year">${year}</text>
      </svg>
    </div>
  `;
}

      ? (townCustom?.value || "").trim()
      : townSelect.value.trim();
  }

  const albergueSelect = document.getElementById("albergueSelect");
  const albergueCustom = document.getElementById("albergueCustomInput");

  if (albergueSelect) {
    d.albergue = albergueSelect.value === "__custom__"
      ? (albergueCustom?.value || "").trim()
      : albergueSelect.value.trim();
  }

  addCustomTown(d.route, d.town);
  addCustomAlbergue(d.town, d.albergue);
}

function bindForm() {
  const d = state.draft;
  let holdTimer = null;

  function startHold(delta) {
    bumpDistance(delta);
    clearInterval(holdTimer);
    holdTimer = setInterval(() => bumpDistance(delta), 70);
  }

  function stopHold() {
    clearInterval(holdTimer);
    holdTimer = null;
  }

  document.getElementById("cancelFormBtn").onclick = () => {
    state.draft = null;
    setView("journal");
  };

 

  document.getElementById("dateInput").oninput = e => {
    d.date = e.target.value;
  };

  document.getElementById("townSelect").onchange = e => {
    if (e.target.value === "__custom__") {
      d.town = "";
      d.albergue = "";
    } else {
      d.town = e.target.value;
      d.albergue = "";
    }
    renderForm();
  };

  const townCustom = document.getElementById("townCustomInput");
  if (townCustom) {
    townCustom.oninput = e => {
      d.town = e.target.value;
    };
  }

  document.getElementById("albergueSelect").onchange = e => {
    if (e.target.value === "__custom__") {
      d.albergue = "";
    } else {
      d.albergue = e.target.value;
    }
    renderForm();
  };

  const albergueCustom = document.getElementById("albergueCustomInput");
  if (albergueCustom) {
    albergueCustom.oninput = e => {
      d.albergue = e.target.value;
    };
  }

  document.getElementById("distanceInput").oninput = e => {
    d.distanceValue = e.target.value;
  };

  document.getElementById("notesInput").oninput = e => {
    d.notes = e.target.value;
  };

  const minus = document.getElementById("distanceMinus");
  const plus = document.getElementById("distancePlus");

  minus.onpointerdown = () => startHold(-0.1);
  plus.onpointerdown = () => startHold(0.1);

  minus.onpointerup = stopHold;
  plus.onpointerup = stopHold;
  minus.onpointerleave = stopHold;
  plus.onpointerleave = stopHold;
  minus.onpointercancel = stopHold;
  plus.onpointercancel = stopHold;

  document.querySelectorAll("[data-unit]").forEach(btn => {
    btn.onclick = () => {
      d.distanceUnit = btn.dataset.unit;
      renderForm();
    };
  });

  document.querySelectorAll("[data-choice]").forEach(btn => {
    btn.onclick = () => {
      const field = btn.dataset.field;
      const value = btn.dataset.choice;
      const multi = btn.dataset.multi === "1";

      if (multi) {
        d[field] = d[field] || [];
        if (d[field].includes(value)) {
          d[field] = d[field].filter(x => x !== value);
        } else {
          d[field].push(value);
        }
      } else {
        d[field] = d[field] === value ? "" : value;
      }

      renderForm();
    };
  });

  document.getElementById("addPersonBtn").onclick = addPerson;
  document.getElementById("personInput").onkeydown = e => {
    if (e.key === "Enter") {
      e.preventDefault();
      addPerson();
    }
  };

  document.querySelectorAll("[data-remove-person]").forEach(btn => {
    btn.onclick = () => {
      d.people = d.people.filter(p => p.id !== btn.dataset.removePerson);
      renderForm();
    };
  });

  document.querySelectorAll("[data-person-photo]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.personPhoto;
      const fileInput = document.querySelector(`[data-person-file="${CSS.escape(id)}"]`);
      if (fileInput) fileInput.click();
    };
  });

  document.querySelectorAll("[data-person-file]").forEach(input => {
    input.onchange = e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      const id = input.dataset.personFile;
      const reader = new FileReader();

      reader.onload = () => {
        d.people = d.people.map(p => p.id === id ? { ...p, photo: reader.result } : p);
        renderForm();
      };

      reader.readAsDataURL(file);
    };
  });

  document.getElementById("addPhotoBtn").onclick = () => document.getElementById("photoInput").click();
  document.getElementById("photoInput").onchange = e => handlePhotos(e.target.files);

  document.querySelectorAll("[data-remove-photo]").forEach(btn => {
    btn.onclick = () => {
      d.photos = d.photos.filter(p => p.id !== btn.dataset.removePhoto);
      renderForm();
    };
  });

  bindStops();

  document.getElementById("saveEntryBtn").onclick = () => {
    saveDraftFromInputs();

    if (!d.town || !d.town.trim()) {
      alert("Choose or type tonight’s town / city before saving.");
      return;
    }

    settings.currentRoute = d.route;
    persistSettings();

    const exists = entries.some(e => e.id === d.id);
    if (exists) {
      entries = entries.map(e => e.id === d.id ? d : e);
    } else {
      entries.push(d);
    }

    persistEntries();
    state.draft = null;
    toast("Saved");
    setView("journal");
  };
}

function bumpDistance(delta) {
  const d = state.draft;
  let n = parseFloat(d.distanceValue || "0");
  if (isNaN(n)) n = 0;

  n = Math.max(0, Math.round((n + delta) * 10) / 10);
  d.distanceValue = n.toFixed(1);

  const input = document.getElementById("distanceInput");
  if (input) input.value = d.distanceValue;
}
function addPerson() {
  const input = document.getElementById("personInput");
  const name = input.value.trim();
  if (!name) return;

  if (!state.draft.people.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    state.draft.people.push({ id: uid(), name, photo: null });
  }

  input.value = "";
  renderForm();
}

function handlePhotos(files) {
  const arr = Array.from(files || []).slice(0, 8 - state.draft.photos.length);
  if (!arr.length) return;

  let remaining = arr.length;
  arr.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      state.draft.photos.push({ id: uid(), src: reader.result });
      remaining--;
      if (remaining === 0) renderForm();
    };
    reader.readAsDataURL(file);
  });
}

function bindStops() {
  const d = state.draft;

  const addBtn = document.getElementById("addStopBtn");
  if (addBtn) {
    addBtn.onclick = () => {
      state.stopDraft = { id: uid(), name: "", type: "Café", area: "", notes: "", photo: null };
      renderForm();
    };
  }

  document.querySelectorAll("[data-remove-stop]").forEach(btn => {
    btn.onclick = () => {
      d.stops = d.stops.filter(s => s.id !== btn.dataset.removeStop);
      renderForm();
    };
  });

  if (!state.stopDraft) return;

  const stop = state.stopDraft;

  document.getElementById("stopName").oninput = e => stop.name = e.target.value;
  document.getElementById("stopType").onchange = e => stop.type = e.target.value;
  document.getElementById("stopArea").oninput = e => stop.area = e.target.value;
  document.getElementById("stopNotes").oninput = e => stop.notes = e.target.value;

  document.getElementById("cancelStopBtn").onclick = () => {
    state.stopDraft = null;
    renderForm();
  };

  document.getElementById("saveStopBtn").onclick = () => {
    if (!stop.name.trim() && !stop.notes.trim()) return;
    stop.name = stop.name.trim();
    d.stops.push(stop);
    state.stopDraft = null;
    renderForm();
  };

  document.getElementById("stopPhotoBtn").onclick = () => document.getElementById("stopPhotoInput").click();

  const removePhoto = document.getElementById("removeStopPhotoBtn");
  if (removePhoto) {
    removePhoto.onclick = () => {
      stop.photo = null;
      renderForm();
    };
  }

  document.getElementById("stopPhotoInput").onchange = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      stop.photo = reader.result;
      renderForm();
    };
    reader.readAsDataURL(file);
  };
}

  document.querySelectorAll("[data-pack-head]").forEach(btn => {

    };
  });

  document.querySelectorAll("[data-pack-check]").forEach(btn => {
    btn.onclick = () => {

function layoutFor(entriesToPrint, i, entry) {
  if (state.printLayout !== "mixed") return Number(state.printLayout);

  let layout = (hashLayout(entry.id) + i) % 5;

  if (i > 0) {
    const prev = (hashLayout(entriesToPrint[i - 1].id) + i - 1) % 5;
    if (layout === prev) layout = (layout + 1) % 5;
  }

  return layout;
}

function printablePage(entry, layout) {
  const photos = (entry.photos || []).map(p => p.src);
  const stopPhotos = (entry.stops || []).filter(s => s.photo).map(s => s.photo);
  const allPhotos = [...photos, ...stopPhotos];

  const p1 = allPhotos[0];
  const p2 = allPhotos[1];
  const p3 = allPhotos[2];
  const p4 = allPhotos[3];

  const people = (entry.people || []).map(p => p.name).join(", ");
  const stops = entry.stops || [];
  const title = entry.town || "Camino Memory";
  const journalText = buildPrettyJournalText(entry);

  const header = `
    <div class="shell-stamp">🐚</div>
    <div class="print-kicker">${escapeHtml(entry.route || "Camino Journal")}</div>
    <div class="print-title">${escapeHtml(title)}</div>
    <div class="print-meta">${escapeHtml(formatDate(entry.date))}</div>
  `;

  const stopBits = stops.length
    ? `<div class="print-stop-list">${stops.slice(0, 6).map(s => `<span class="print-stop">${escapeHtml(s.type)}: ${escapeHtml(s.name || "Stop")}</span>`).join("")}</div>`
    : "";

  const peopleBit = people
    ? `<div class="print-people">People met along the way: ${escapeHtml(people)}</div>`
    : "";

  if (layout === 1) {
    return `
      <section class="print-page layout-scrapbook">
        ${header}

        <div class="collage">
          ${
            p1
              ? `<div class="scrap-tape" style="left:12%;top:4px;"></div><div class="polaroid p1"><img src="${p1}"><div class="scrapbook-caption">a Camino moment</div></div>`
              : `<div class="blank-photo" style="position:absolute;left:4%;top:10px;width:44%;height:245px;transform:rotate(-5deg);">photo memory</div>`
          }
          ${
            p2
              ? `<div class="scrap-tape" style="right:15%;top:28px;transform:rotate(7deg);"></div><div class="polaroid p2"><img src="${p2}"><div class="scrapbook-caption">along the way</div></div>`
              : `<div class="blank-photo" style="position:absolute;right:5%;top:35px;width:44%;height:245px;transform:rotate(4deg);">the road</div>`
          }
          ${
            p3
              ? `<div class="polaroid p3"><img src="${p3}"><div class="scrapbook-caption">remember this</div></div>`
              : `<div class="blank-photo" style="position:absolute;left:28%;bottom:0;width:44%;height:245px;transform:rotate(1deg);">small moments</div>`
          }
        </div>

        ${stopBits}

        <div class="handwritten-note-card">
          <div class="handwritten-entry">${escapeHtml(journalText)}</div>
        </div>

        ${peopleBit}
      </section>
    `;
  }

  if (layout === 2) {
    return `
      <section class="print-page layout-log">
        ${header}

        <div class="log-grid">
          <div class="log-box">
            <div class="log-label">From</div>
            <div class="log-value">${escapeHtml(previousTownForEntry(entry) || "—")}</div>
          </div>
          <div class="log-box">
            <div class="log-label">To</div>
            <div class="log-value">${escapeHtml(entry.town || "—")}</div>
          </div>
          <div class="log-box">
            <div class="log-label">Distance</div>
            <div class="log-value">${escapeHtml(distanceText(entry) || "—")}</div>
          </div>
          <div class="log-box">
            <div class="log-label">Tonight</div>
            <div class="log-value">${escapeHtml(entry.albergue || "—")}</div>
          </div>
        </div>

        ${
          p1
            ? `<img class="print-photo" src="${p1}" style="width:100%;height:275px;">`
            : `<div class="blank-photo">today’s image</div>`
        }

        ${stopBits}

        <div class="handwritten-note-card alt-tilt">
          <div class="handwritten-entry">${escapeHtml(journalText)}</div>
        </div>

        ${peopleBit}
      </section>
    `;
  }

  if (layout === 3) {
    return `
      <section class="print-page layout-photo">
        ${header}

        ${
          p1
            ? `<img class="print-photo hero-photo" src="${p1}">`
            : `<div class="blank-photo" style="height:430px;margin:22px 0;">Camino photo</div>`
        }

        <div class="handwritten-note-card">
          <div class="handwritten-entry">${escapeHtml(journalText)}</div>
        </div>

        <div class="mini-row">
          ${
            [p2, p3, p4].filter(Boolean).length
              ? [p2, p3, p4].filter(Boolean).map(src => `<img class="print-photo" src="${src}">`).join("")
              : `<div class="blank-photo">café</div><div class="blank-photo">people</div><div class="blank-photo">view</div>`
          }
        </div>

        ${stopBits}
        ${peopleBit}
      </section>
    `;
  }

  if (layout === 4) {
    return `
      <section class="print-page layout-diary">
        ${header}

        <div class="diary-panel">
          <div class="handwritten-entry">${escapeHtml(journalText)}</div>
        </div>

        ${stopBits}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:24px;">
          ${
            allPhotos.slice(0,4).length
              ? allPhotos.slice(0,4).map(src => `<img class="print-photo" src="${src}" style="width:100%;height:190px;">`).join("")
              : `<div class="blank-photo">morning</div><div class="blank-photo">midday</div><div class="blank-photo">evening</div><div class="blank-photo">tonight</div>`
          }
        </div>

        ${peopleBit}
      </section>
    `;
  }

  return `
    <section class="print-page layout-postcard">
      ${header}

      <div class="photo-area">
        ${
          p1
            ? `<img class="print-photo" src="${p1}" style="width:100%;">`
            : `<div class="blank-photo">postcard image</div>`
        }

        <div class="side-photos">
          ${
            [p2, p3].filter(Boolean).length
              ? [p2, p3].filter(Boolean).map(src => `<img class="print-photo" src="${src}" style="width:100%;">`).join("")
              : `<div class="blank-photo" style="min-height:155px;">stamp</div><div class="blank-photo" style="min-height:155px;">memory</div>`
          }
        </div>
      </div>

      ${stopBits}

      <div class="handwritten-note-card alt-tilt">
        <div class="handwritten-entry">${escapeHtml(journalText)}</div>
      </div>

      ${peopleBit}
    </section>
  `;
}

function backupData() {
  const payload = {
    app: "camino-journal",
    version: 3,
    exportedAt: new Date().toISOString(),
    entries,
    custom,
    packing,
    travel,
    settings
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "camino-journal-backup-" + todayISO() + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("Backup created");
}

function restoreData(file) {
  const reader = new FileReader();

  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.entries)) throw new Error("Bad backup");

      entries = data.entries.map(migrateEntry);
      custom = data.custom || data.customRoutes || {};
      packing = Array.isArray(data.packing) ? data.packing : Array.isArray(data.packingList) ? data.packingList : packing;
      travel = Array.isArray(data.travel) ? data.travel : Array.isArray(data.travelLegs) ? data.travelLegs : travel;
      settings = data.settings || settings;

      persistEntries();
      persistCustom();
      persistPacking();
      persistTravel();
      persistSettings();

      toast("Restored " + entries.length + " entries");
      setView("journal");
    } catch (e) {
      toast("Couldn't read that backup file.", true);
    }
  };

  reader.readAsText(file);
}
